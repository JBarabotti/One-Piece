<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — One Piece</title>
  <script src="https://kit.fontawesome.com/dd226ad74d.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Pirata+One&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/signup-Cm2G35oN.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-AcyiL45k.js">
  <link rel="modulepreload" crossorigin href="/assets/header-CUDAU1Vv.js">
  <link rel="stylesheet" crossorigin href="/assets/auth-DMIgo2Ho.css">
</head>
<body>
  <video class="page-bg-video" autoplay muted loop playsinline src="/assets/background-C-lZ2_Vw.mp4"></video>
  <div class="background"></div>

  <header id="site-header"></header>

  <div class="page-wrapper">
    <div class="glass-card">
      <p class="page-title">S'inscrire</p>
      <p class="page-subtitle">Commencez votre aventure</p>

      <div id="alert-box"></div>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label">Nom d'utilisateur</label>
          <input type="text" id="username" class="form-input" placeholder="MonPseudo" required minlength="3" maxlength="30" autocomplete="username">
          <div id="username-status" style="font-size:12px; margin-top:6px; font-family:'Inter',sans-serif;"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Adresse e-mail</label>
          <input type="email" id="email" class="form-input" placeholder="email@exemple.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" id="password" class="form-input" placeholder="Minimum 8 caractères" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmer le mot de passe</label>
          <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Créer mon compte</button>
      </form>

      <p class="form-text">
        Déjà un compte ? <a href="login.html" class="form-link">Se connecter</a>
      </p>
    </div>
  </div>

</body>
</html>
