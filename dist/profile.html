<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon compte — One Piece</title>
  <script src="https://kit.fontawesome.com/dd226ad74d.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Pirata+One&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/profile-CVvGElCR.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-CZMt0Zkx.js">
  <link rel="modulepreload" crossorigin href="/assets/header-BzR-UAik.js">
  <link rel="modulepreload" crossorigin href="/assets/crop-modal-DxN7ZLiY.js">
  <link rel="stylesheet" crossorigin href="/assets/auth-DvL_tT7A.css">
</head>
<body>
  <div class="background"></div>

  <header id="site-header"></header>

  <div class="profile-page">
    <div class="profile-container">

      <!-- Profile header card -->
      <div class="profile-header-card" id="profile-header-card">
        <div class="profile-avatar-wrap">
          <div id="profile-avatar-display"></div>
        </div>
        <div class="profile-info">
          <h2 id="profile-username-display"></h2>
          <div id="profile-faction-badge"></div>
          <div class="profile-email" id="profile-email-display"></div>
        </div>
      </div>

      <!-- Avatar section -->
      <div class="profile-section-card">
        <div class="profile-section-title">Photo de profil</div>
        <div class="profile-avatar-options">
          <div class="profile-avatar-option-tab active" id="tab-upload" data-tab="upload">
            <i class="fas fa-upload"></i> Importer
          </div>
          <div class="profile-avatar-option-tab" id="tab-gallery" data-tab="gallery">
            <i class="fas fa-image"></i> Galerie d'avatars
          </div>
        </div>
        <div id="avatar-tab-upload">
          <label class="profile-avatar-upload-label" for="avatar-file-input">
            <i class="fas fa-camera"></i> Choisir une photo depuis votre appareil
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
          </label>
        </div>
        <div id="avatar-tab-gallery" style="display:none;">
          <div id="preset-avatars-grid" class="preset-avatars-grid">
            <div class="preset-loading">Chargement des avatars…</div>
          </div>
        </div>
      </div>

      <div id="alert-global"></div>

      <!-- Username section -->
      <div class="profile-section-card">
        <div class="profile-section-title">Nom d'utilisateur</div>
        <div class="profile-field-row">
          <span class="profile-field-value" id="username-val"></span>
          <button class="btn-edit" id="username-edit-btn">Modifier</button>
        </div>
        <div id="username-edit-form" style="display:none;">
          <div class="profile-field-row">
            <input type="text" class="profile-edit-input" id="username-new-input" placeholder="Nouveau nom d'utilisateur" minlength="3" maxlength="30">
            <button class="btn-save" id="username-save-btn">Enregistrer</button>
            <button class="btn-cancel" id="username-cancel-btn">Annuler</button>
          </div>
          <div id="username-check-status" style="font-size:12px; margin-top:6px; font-family:'Inter',sans-serif;"></div>
        </div>
      </div>

      <!-- Faction section -->
      <div class="profile-section-card">
        <div class="profile-section-title">Faction</div>
        <div class="profile-field-row">
          <span class="profile-field-value" id="faction-val"></span>
          <button class="btn-edit" id="faction-edit-btn">Modifier</button>
        </div>
      </div>

      <!-- Password section -->
      <div class="profile-section-card">
        <div class="profile-section-title">Mot de passe</div>
        <div class="profile-field-row">
          <span class="profile-field-value">••••••••••</span>
          <button class="btn-edit" id="password-edit-btn">Modifier</button>
        </div>
        <div id="password-edit-form" style="display:none;">
          <div class="profile-field-row" style="flex-direction:column; align-items:stretch; gap:10px;">
            <input type="password" class="profile-edit-input" id="new-password-input" placeholder="Nouveau mot de passe (min. 8 caractères)" minlength="8">
            <input type="password" class="profile-edit-input" id="confirm-password-input" placeholder="Confirmer le mot de passe">
          </div>
          <div style="display:flex;gap:10px;margin-top:14px;">
            <button class="btn-save" id="password-save-btn">Enregistrer</button>
            <button class="btn-cancel" id="password-cancel-btn">Annuler</button>
          </div>
          <div id="password-status" style="font-size:12px;margin-top:8px;font-family:'Inter',sans-serif;"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
