<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — One Piece</title>
  <script src="https://kit.fontawesome.com/dd226ad74d.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Pirata+One&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/login-X0HbSSRT.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-CZMt0Zkx.js">
  <link rel="modulepreload" crossorigin href="/assets/header-BzR-UAik.js">
  <link rel="stylesheet" crossorigin href="/assets/auth-DvL_tT7A.css">
</head>
<body>
  <video class="page-bg-video" autoplay muted loop playsinline src="/assets/background-C-lZ2_Vw.mp4"></video>
  <div class="background"></div>

  <header id="site-header"></header>

  <div class="page-wrapper">
    <div class="glass-card">
      <p class="page-title">Se connecter</p>
      <p class="page-subtitle">Rejoignez le Grand Line</p>

      <div id="alert-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Adresse e-mail ou Nom d'utilisateur</label>
          <input type="text" id="identifier" class="form-input" placeholder="email@exemple.com ou MonPseudo" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="form-checkbox-row">
          <input type="checkbox" id="remember-me" checked>
          <label for="remember-me">Se souvenir de moi</label>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Se connecter</button>
      </form>

      <p class="form-text" style="margin-top: 14px;">
        <a href="reset-password.html" class="form-link">Mot de passe oublié ?</a>
      </p>

      <div class="divider"><span>Nouveau ?</span></div>

      <a href="signup.html" class="btn-secondary" style="display:block; text-align:center; text-decoration:none;">S'inscrire</a>
    </div>
  </div>

</body>
</html>
