<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — One Piece</title>
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/pages.css">
  <script src="https://kit.fontawesome.com/dd226ad74d.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body>
  <div class="background"></div>

  <header id="site-header"></header>

  <div class="messages-page">
    <div class="messages-layout">

      <!-- Sidebar -->
      <div class="messages-sidebar">
        <div class="messages-sidebar-header">
          <div class="messages-sidebar-title">Messages</div>
          <input type="text" id="user-search" class="messages-search-input" placeholder="Envoyer à… (recherche)">
          <div id="search-results" class="messages-search-results" style="display:none;"></div>
        </div>
        <div class="conv-list" id="conv-list">
          <div style="padding:20px; color:#475569; font-family:'Inter',sans-serif; font-size:13px;">Chargement...</div>
        </div>
      </div>

      <!-- Main panel -->
      <div class="messages-main" id="messages-main">
        <div class="messages-empty-state">
          <i class="fas fa-paper-plane"></i>
          <span>Sélectionnez une conversation</span>
          <span style="font-family:'Inter',sans-serif; font-size:14px; color:#334155;">ou recherchez un utilisateur pour envoyer un message</span>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="JS/messages.js"></script>
</body>
</html>
