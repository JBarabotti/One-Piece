<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — One Piece</title>
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="CSS/pages.css">
  <script src="https://kit.fontawesome.com/dd226ad74d.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body>
  <video class="page-bg-video" autoplay muted loop playsinline src="background.mp4"></video>
  <div class="background"></div>

  <header id="site-header"></header>

  <div class="page-wrapper">
    <div class="glass-card">
      <p class="page-title">Mot de passe oublié</p>

      <!-- Step 1: request OTP -->
      <div id="step-1">
        <p class="page-subtitle">Entrez votre e-mail pour recevoir un code de vérification</p>
        <div id="alert-box-1"></div>
        <form id="otp-form">
          <div class="form-group">
            <label class="form-label">Adresse e-mail</label>
            <input type="email" id="email-input" class="form-input" placeholder="email@exemple.com" required>
          </div>
          <button type="submit" class="btn-primary" id="send-btn">Envoyer le code</button>
        </form>
        <p class="form-text"><a href="login.html" class="form-link">Retour à la connexion</a></p>
      </div>

      <!-- Step 2: verify OTP + new password -->
      <div id="step-2" style="display:none;">
        <p class="page-subtitle">Entrez le code reçu par e-mail et choisissez un nouveau mot de passe</p>
        <div id="alert-box-2"></div>
        <form id="reset-form">
          <div class="form-group">
            <label class="form-label">Code de vérification</label>
            <input type="text" id="otp-input" class="form-input" placeholder="123456" maxlength="6" required>
          </div>
          <div class="form-group">
            <label class="form-label">Nouveau mot de passe</label>
            <input type="password" id="new-password" class="form-input" placeholder="Minimum 8 caractères" minlength="8" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmer le mot de passe</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" minlength="8" required>
          </div>
          <button type="submit" class="btn-primary" id="confirm-btn">Confirmer</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="JS/reset-password.js"></script>
</body>
</html>
